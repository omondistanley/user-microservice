{% extends "base_demo.html" %}
{% block title %}Profile — demo{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">Profile <span class="badge-preview" style="margin-left:8px;">Sample</span></h1>
</div>
<div class="card">
  <div class="form-group">
    <label class="form-label">Name</label>
    <div style="padding:8px 0;">{{ profile.name }}</div>
  </div>
  <div class="form-group">
    <label class="form-label">Email</label>
    <div style="padding:8px 0;">{{ profile.email }}</div>
  </div>
  <p style="font-size:13px;color:var(--s500);margin-top:16px;">Demo profile. Sign up for the full app to edit.</p>
</div>
{% endblock %}
