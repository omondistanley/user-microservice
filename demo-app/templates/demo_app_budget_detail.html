{% extends "base_demo.html" %}
{% block title %}Budget Detail — demo{% endblock %}
{% block nav_bud %}active{% endblock %}
{% block content %}
<h1 style="font-size:22px;margin-bottom:16px;">
  Budget <span class="badge-preview" style="margin-left:8px;">{{ budget.month }}</span>
</h1>

<div class="card" style="max-width:720px;">
  <h2 style="font-size:15px;margin-bottom:12px;">Edit budget</h2>

  <form id="budget-edit-form" style="display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;">
    <div>
      <label style="display:block;font-size:12px;color:#64748b;margin-bottom:4px;">Month</label>
      <input name="month" type="month" required value="{{ budget.month }}"
        style="padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;width:180px;" />
    </div>

    <div>
      <label style="display:block;font-size:12px;color:#64748b;margin-bottom:4px;">Category</label>
      <input name="category" type="text" maxlength="64" required value="{{ budget.category }}"
        style="padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;width:200px;" />
    </div>

    <div>
      <label style="display:block;font-size:12px;color:#64748b;margin-bottom:4px;">Limit</label>
      <input name="limit" type="number" step="0.01" min="0.01" max="999999" required value="{{ budget.limit }}"
        style="padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;width:140px;" />
    </div>

    <button type="submit" class="btn btn-primary">Save</button>
  </form>

  <p id="budget-edit-err" style="color:#dc2626;font-size:13px;margin-top:10px;display:none;"></p>

  <div style="margin-top:18px;display:flex;gap:10px;flex-wrap:wrap;">
    <a href="/demo/app/budgets?month={{ budget.month }}" class="btn btn-ghost" style="text-decoration:none;">Back</a>
    <button type="button" class="btn btn-ghost" disabled style="opacity:.5;pointer-events:none;">
      Delete budget (disabled in demo)
    </button>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
  var form = document.getElementById('budget-edit-form');
  var errEl = document.getElementById('budget-edit-err');
  form.onsubmit = function(ev) {
    ev.preventDefault();
    errEl.style.display = 'none';
    var fd = new FormData(form);
    var payload = {
      month: fd.get('month'),
      category: fd.get('category'),
      limit: parseFloat(fd.get('limit'))
    };
    fetch('/api/demo/budgets/{{ budget.id }}', {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).then(function(r) {
      if (!r.ok) throw new Error();
      window.location.href = '/demo/app/budgets?month=' + encodeURIComponent(payload.month);
    }).catch(function() {
      errEl.textContent = 'Save failed. Session may have expired.';
      errEl.style.display = 'block';
    });
  };
})();
</script>
{% endblock %}
