<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block watch_title %}Watch demo — pocketii{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --indigo: #6366F1; --slate-100: #F1F5F9; --slate-700: #334155; --slate-800: #1E293B; --slate-900: #0f172a; }
    body { font-family: Inter, sans-serif; margin: 0; background: var(--slate-100); color: var(--slate-800); }

    .scroll-area { padding-bottom: 160px; }
    .watch-mini-nav {
      position: sticky; top: 0; z-index: 50;
      background: rgba(15,23,42,.98);
      color: #fff;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .watch-mini-nav a {
      color: #e2e8f0;
      text-decoration: none;
      font-weight: 700;
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
    }
    .watch-mini-nav a:hover { background: rgba(255,255,255,.10); }
    .watch-controls {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: rgba(15,23,42,.95); color: #fff; padding: 16px 20px;
      display: flex; flex-wrap: wrap; align-items: center; gap: 12px; justify-content: space-between;
    }
    .watch-controls .narration { flex: 1; min-width: 200px; max-width: 640px; }
    #watch-narration-title { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
    #watch-narration-body { font-size: 13px; color: #cbd5e1; line-height: 1.45; }
    #watch-caption { position: absolute; left: -9999px; width: 1px; height: 1px; overflow: hidden; }
    .watch-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .watch-bar button, .watch-bar a {
      padding: 8px 14px; border-radius: 8px; font-weight: 600; font-size: 13px;
      cursor: pointer; border: none; text-decoration: none; display: inline-block;
    }
    #watch-pause { background: #475569; color: #fff; }
    #watch-next { background: var(--indigo); color: #fff; }
    #watch-skip-interactive { background: #10B981; color: #fff; }
    #watch-progress { font-size: 12px; color: #94a3b8; }
    .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.06); margin: 16px auto; max-width: 860px; }
    .hero { background: linear-gradient(135deg, #1e1b4b, #312e81); color: #fff; padding: 36px 20px; text-align:center; max-width: 860px; margin: 18px auto 0 auto; border-radius: 14px; }
    .hero h2 { font-size: 24px; margin-bottom: 8px; }
    .hero p { opacity: .85; max-width: 560px; margin: 0 auto; line-height: 1.5; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; }
    th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--slate-100); font-size: 14px; }
    th { background: var(--slate-100); font-weight: 600; }
    .pill { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 12px; background: var(--slate-100); color: #9a3412; font-weight: 700; }
  </style>
</head>
<body>
  <div class="watch-mini-nav" aria-label="Watch navigation">
    <a href="/demo/watch/app/dashboard">Dashboard</a>
    <a href="/demo/watch/app/expenses">Expenses</a>
    <a href="/demo/watch/app/budgets">Budgets</a>
    <a href="/demo/watch/app/insights">Insights</a>
    <a href="/demo/watch/app/recommendations">Recommendations</a>
    <a href="/demo/watch/app/investments">Investments</a>
  </div>
  <div class="scroll-area">
    {% block watch_content %}{% endblock %}
  </div>

  <div class="watch-controls" role="region" aria-label="Demo narration">
    <div class="narration">
      <div id="watch-narration-title"></div>
      <div id="watch-narration-body"></div>
      <div id="watch-caption" aria-live="polite"></div>
    </div>
    <div class="watch-bar">
      <span id="watch-progress"></span>
      <button type="button" id="watch-pause" aria-pressed="false">Pause</button>
      <button type="button" id="watch-next">Next</button>
      <a href="/demo/start" id="watch-skip-interactive">Skip to interactive</a>
    </div>
  </div>

  <script>
    window.DEMO_SCENES = {{ scenes|tojson }};
  </script>
  <script src="/static/js/watch.js"></script>
</body>
</html>
