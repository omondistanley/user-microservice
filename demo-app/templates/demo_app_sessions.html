{% extends "base_demo.html" %}
{% block title %}Sessions — demo{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">Sessions <span class="badge-preview" style="margin-left:8px;">Sample</span></h1>
</div>
<div class="card">
  <p style="font-size:13px;color:var(--s500);margin-bottom:16px;">Active demo session. In production you see all devices and can revoke.</p>
  <div class="table-wrap">
    <table>
      <thead>
        <tr><th>Device</th><th>Last active</th></tr>
      </thead>
      <tbody>
        {% for s in sessions %}
        <tr><td>{{ s.device }}</td><td>{{ s.last_active }}</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
