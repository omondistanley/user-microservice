<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pocketii — Live demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: Inter, sans-serif; background: #0f172a; color: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .box { max-width: 520px; text-align: center; }
    h1 { font-size: 28px; margin-bottom: 12px; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 28px; font-size: 15px; }
    .actions { display: flex; flex-direction: column; gap: 12px; }
    @media (min-width: 480px) { .actions { flex-direction: row; justify-content: center; } }
    a.btn {
      display: inline-flex; align-items: center; justify-content: center; padding: 14px 28px; border-radius: 10px;
      font-weight: 600; text-decoration: none; font-size: 15px;
    }
    .btn-watch { background: rgba(255,255,255,.1); color: #fff; border: 1px solid rgba(255,255,255,.2); }
    .btn-watch:hover { background: rgba(255,255,255,.15); }
    .btn-try { background: #6366F1; color: #fff; }
    .btn-try:hover { background: #4F46E5; }
    .fine { font-size: 12px; color: #64748b; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>pocketii demo</h1>
    <p>
      Explore the product with <strong>sample data only</strong>. No Plaid, Alpaca, or other paid APIs are called.
      The interactive sandbox resets periodically.
    </p>
    <div class="actions">
      <a class="btn btn-watch" href="/demo/watch">Watch demo</a>
      <a class="btn btn-try" href="/demo/start">Try interactive demo</a>
    </div>
    <p class="fine">Prefer the full app? Register on the main site.</p>
  </div>
</body>
</html>
