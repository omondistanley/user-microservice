{% extends "base_demo_watch.html" %}
{% block title %}Budget detail — Watch demo{% endblock %}
{% block content %}
<h1 style="font-size:22px;margin-bottom:16px;">
  Budget <span class="badge-preview" style="margin-left:8px;">{{ budget.month }}</span>
</h1>

<div class="card" style="max-width:720px;">
  <h2 style="font-size:15px;margin-bottom:12px;">View budget (read-only)</h2>

  <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;">
    <div>
      <label style="display:block;font-size:12px;color:#64748b;margin-bottom:4px;">Month</label>
      <input disabled value="{{ budget.month }}" type="text"
        style="padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;width:180px;background:#f8fafc;color:#0f172a;" />
    </div>
    <div>
      <label style="display:block;font-size:12px;color:#64748b;margin-bottom:4px;">Category</label>
      <input disabled value="{{ budget.category }}" type="text"
        style="padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;width:200px;background:#f8fafc;color:#0f172a;" />
    </div>
    <div>
      <label style="display:block;font-size:12px;color:#64748b;margin-bottom:4px;">Limit</label>
      <input disabled value="{{ budget.limit }}" type="text"
        style="padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;width:140px;background:#f8fafc;color:#0f172a;" />
    </div>
  </div>

  <div style="margin-top:18px;display:flex;gap:10px;flex-wrap:wrap;">
    <a href="/demo/watch/app/budgets?month={{ budget.month }}" class="btn btn-ghost" style="text-decoration:none;">Back</a>
    <a href="/demo/start" class="btn btn-primary" style="text-decoration:none;">Skip to interactive</a>
  </div>
</div>
{% endblock %}
