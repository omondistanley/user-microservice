{% extends "demo_watch_shell.html" %}
{% block watch_title %}Watch — Budget detail{% endblock %}
{% block watch_content %}
  <div class="hero">
    <h2>Budget detail <span class="pill">preview</span></h2>
    <p>Edit controls are visible but disabled in watch mode.</p>
  </div>

  <div class="card" style="max-width:760px;">
    <h3 style="font-size:15px;margin-bottom:14px;">Budget</h3>

    <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;">
      <div>
        <label style="display:block;font-size:12px;color:#64748b;margin-bottom:4px;">Month</label>
        <input disabled value="{{ budget.month }}" type="text"
          style="padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;width:160px;background:#f8fafc;color:#0f172a;" />
      </div>
      <div>
        <label style="display:block;font-size:12px;color:#64748b;margin-bottom:4px;">Category</label>
        <input disabled value="{{ budget.category }}" type="text"
          style="padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;width:200px;background:#f8fafc;color:#0f172a;" />
      </div>
      <div>
        <label style="display:block;font-size:12px;color:#64748b;margin-bottom:4px;">Limit</label>
        <input disabled value="{{ budget.limit }}" type="text"
          style="padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;width:160px;background:#f8fafc;color:#0f172a;" />
      </div>
    </div>

    <div style="margin-top:18px;display:flex;gap:10px;flex-wrap:wrap;">
      <button type="button" class="btn btn-primary" disabled style="opacity:.5;pointer-events:none;">Save (disabled)</button>
      <button type="button" class="btn btn-ghost" disabled style="opacity:.5;pointer-events:none;">Delete (disabled)</button>
      <a href="/demo/watch/app/budgets" class="btn btn-ghost" style="text-decoration:none;">Back</a>
    </div>
  </div>
{% endblock %}
