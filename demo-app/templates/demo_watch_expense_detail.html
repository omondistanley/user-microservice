{% extends "base_demo_watch.html" %}
{% block title %}Expense detail — Watch demo{% endblock %}
{% block content %}
<h1 style="font-size:22px;margin-bottom:16px;">
  Expense <span class="badge-preview" style="margin-left:8px;">Watch</span>
</h1>

<div class="card" style="max-width:720px;">
  <h2 style="font-size:15px;margin-bottom:12px;">View expense (read-only)</h2>

  <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;">
    <div>
      <label style="display:block;font-size:12px;color:#64748b;margin-bottom:4px;">Amount</label>
      <input disabled value="{{ expense.amount }}" type="text"
        style="padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;width:140px;background:#f8fafc;color:#0f172a;" />
    </div>
    <div style="flex:1;min-width:220px;">
      <label style="display:block;font-size:12px;color:#64748b;margin-bottom:4px;">Description</label>
      <input disabled value="{{ expense.description }}" type="text"
        style="padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;width:100%;max-width:360px;background:#f8fafc;color:#0f172a;" />
    </div>
    <div>
      <label style="display:block;font-size:12px;color:#64748b;margin-bottom:4px;">Category</label>
      <input disabled value="{{ expense.category }}" type="text"
        style="padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;width:170px;background:#f8fafc;color:#0f172a;" />
    </div>
    <div>
      <label style="display:block;font-size:12px;color:#64748b;margin-bottom:4px;">Date</label>
      <input disabled value="{{ expense.expense_date }}" type="text"
        style="padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;width:170px;background:#f8fafc;color:#0f172a;" />
    </div>
  </div>

  <p style="margin-top:14px;font-size:13px;color:var(--s500);">In the interactive demo: Edit and Delete are available from this screen.</p>
  <div style="margin-top:18px;display:flex;gap:10px;flex-wrap:wrap;">
    <a href="/demo/watch/app/expenses" class="btn btn-ghost" style="text-decoration:none;">Back to expenses</a>
    <a href="/demo/start" class="btn btn-primary" style="text-decoration:none;">Skip to interactive</a>
  </div>
</div>
{% endblock %}
