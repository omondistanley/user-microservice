<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Start interactive demo — pocketii</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: Inter, sans-serif; background: #0f172a; color: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .box { max-width: 440px; text-align: center; }
    h1 { font-size: 22px; margin-bottom: 12px; }
    p { color: #94a3b8; font-size: 14px; line-height: 1.55; margin-bottom: 24px; }
    button {
      width: 100%; padding: 14px; border-radius: 10px; border: none; background: #6366F1; color: #fff;
      font-weight: 700; font-size: 15px; cursor: pointer;
    }
    button:disabled { opacity: .6; cursor: wait; }
    .err { color: #f87171; font-size: 13px; margin-top: 12px; }
    a { color: #a5b4fc; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Interactive sandbox</h1>
    <p>
      You’ll get a private browser session. Add sample expenses — they stay in this demo only and are cleared on a schedule.
      No password. No bank linking.
    </p>
    <button type="button" id="enter">Enter demo</button>
    <p class="err" id="err" style="display:none;"></p>
    <p style="margin-top:20px;"><a href="/demo/watch">Watch automated demo</a> · <a href="/demo">Back</a></p>
  </div>
  <script>
    (function() {
      var next = {{ next_path|tojson }};
      document.getElementById('enter').onclick = function() {
        var btn = this; btn.disabled = true;
        var err = document.getElementById('err');
        err.style.display = 'none';
        fetch('/demo/session', { method: 'POST', credentials: 'same-origin' })
          .then(function(r) {
            if (!r.ok) throw new Error('Too many attempts or server error');
            window.location.href = next || '/demo/app/dashboard';
          })
          .catch(function(e) {
            err.textContent = 'Could not start session. Try again later.';
            err.style.display = 'block';
            btn.disabled = false;
          });
      };
    })();
  </script>
</body>
</html>
