{% extends "base_demo.html" %}
{% block title %}Notifications — demo{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">Notifications <span class="badge-preview" style="margin-left:8px;">Sample</span></h1>
</div>
<div class="card">
  <ul style="list-style:none;padding:0;margin:0;">
    {% for n in notifications %}
    <li style="padding:16px;border-bottom:1px solid var(--s100);">
      <div style="font-weight:600;">{{ n.title }}</div>
      <div style="font-size:13px;color:var(--s500);margin-top:4px;">{{ n.body }}</div>
      <div style="font-size:11px;color:var(--s400);margin-top:8px;">{{ n.created }}</div>
    </li>
    {% else %}
    <li style="padding:24px;color:var(--s500);text-align:center;">No notifications.</li>
    {% endfor %}
  </ul>
</div>
{% endblock %}
