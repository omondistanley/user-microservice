{% extends "base_demo_watch.html" %}
{% block title %}Add expense — Watch demo{% endblock %}
{% block content %}
<div class="container">
  <p class="page-back-wrap"><a href="/demo/watch/app/expenses" class="page-back-link">← Expenses</a></p>
  <div class="page-header">
    <h1 class="page-title">Add expense <span class="badge-preview" style="margin-left:8px;">Watch</span></h1>
  </div>
  <div class="card">
    <div style="display:flex;flex-direction:column;gap:1rem;max-width:400px;">
      <div class="form-group">
        <label class="form-label" for="amount">Amount</label>
        <input id="amount" name="amount" type="text" disabled value="12.50"
          class="form-input" style="background:#f8fafc;color:#0f172a;">
      </div>
      <div class="form-group">
        <label class="form-label" for="description">Description</label>
        <input id="description" name="description" type="text" disabled value="Coffee"
          class="form-input" style="background:#f8fafc;color:#0f172a;">
      </div>
      <div class="form-group">
        <label class="form-label" for="category">Category</label>
        <input id="category" name="category" type="text" disabled value="Food"
          class="form-input" style="background:#f8fafc;color:#0f172a;">
      </div>
      <div class="form-group">
        <label class="form-label" for="expense_date">Date</label>
        <input id="expense_date" name="expense_date" type="text" disabled value="2026-03-15"
          class="form-input" style="background:#f8fafc;color:#0f172a;">
      </div>
      <div>
        <button type="button" class="btn btn-primary" disabled style="opacity:.6;pointer-events:none;">Save</button>
        <a href="/demo/watch/app/expenses" class="btn btn-ghost" style="text-decoration:none;">Cancel</a>
      </div>
    </div>
    <p style="color:var(--s500);font-size:13px;margin-top:12px;">In the interactive demo you submit this form to add an expense.</p>
  </div>
</div>
{% endblock %}
