{% extends "base_demo.html" %}
{% block title %}Edit Expense — demo{% endblock %}
{% block nav_exp %}active{% endblock %}
{% block content %}
<h1 style="font-size:22px;margin-bottom:16px;">
  Expense <span class="badge-preview" style="margin-left:8px;">Sandbox</span>
</h1>

<div class="card" style="max-width:720px;">
  <h2 style="font-size:15px;margin-bottom:12px;">Edit expense</h2>

  <form id="expense-edit-form" style="display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;">
    <div>
      <label style="display:block;font-size:12px;color:#64748b;margin-bottom:4px;">Amount</label>
      <input name="amount" type="number" step="0.01" min="0.01" max="999999" required
        value="{{ expense.amount }}" style="padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;width:140px;" />
    </div>

    <div style="flex:1;min-width:220px;">
      <label style="display:block;font-size:12px;color:#64748b;margin-bottom:4px;">Description</label>
      <input name="description" type="text" maxlength="500" required
        value="{{ expense.description }}"
        style="padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;width:100%;max-width:360px;" />
    </div>

    <div>
      <label style="display:block;font-size:12px;color:#64748b;margin-bottom:4px;">Category</label>
      <input name="category" type="text" maxlength="64" required
        value="{{ expense.category }}"
        style="padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;width:170px;" />
    </div>

    <div>
      <label style="display:block;font-size:12px;color:#64748b;margin-bottom:4px;">Date</label>
      <input name="expense_date" type="date" required
        value="{{ expense.expense_date }}"
        style="padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;width:170px;" />
    </div>

    <button type="submit" class="btn btn-primary">Save</button>
  </form>

  <p id="expense-edit-err" style="color:#dc2626;font-size:13px;margin-top:10px;display:none;"></p>

  <div style="margin-top:18px;display:flex;gap:10px;flex-wrap:wrap;">
    <a href="/demo/app/expenses" class="btn btn-ghost" style="text-decoration:none;">Back to expenses</a>
    <button type="button" class="btn btn-ghost" disabled style="opacity:.5;pointer-events:none;">
      Delete expense (disabled in demo)
    </button>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
  var form = document.getElementById('expense-edit-form');
  var errEl = document.getElementById('expense-edit-err');
  form.onsubmit = function(ev) {
    ev.preventDefault();
    errEl.style.display = 'none';
    var fd = new FormData(form);
    var payload = {
      amount: parseFloat(fd.get('amount')),
      description: fd.get('description'),
      category: fd.get('category'),
      expense_date: fd.get('expense_date')
    };
    fetch('/api/demo/expenses/{{ expense.id }}', {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).then(function(r) {
      if (!r.ok) throw new Error();
      window.location.href = '/demo/app/expenses/{{ expense.id }}';
    }).catch(function() {
      errEl.textContent = 'Save failed. Session may have expired.';
      errEl.style.display = 'block';
    });
  };
})();
</script>
{% endblock %}
