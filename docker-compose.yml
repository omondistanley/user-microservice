services:
  postgres:
    image: postgres:16-alpine
    container_name: expense_tracker_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: expense_tracker_redis
    ports:
      - "6379:6379"

  user-migrations:
    build:
      context: .
      dockerfile: user-microservice/Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: users_db
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "python run_migration.py migrations/create_user_table.sql &&
             python run_migration.py migrations/002_refresh_token.sql &&
             python run_migration.py migrations/003_password_reset_token.sql &&
             python run_migration.py migrations/004_email_verification.sql &&
             python run_migration.py migrations/005_oauth_provider.sql &&
             python run_migration.py migrations/006_security_audit_and_refresh_hardening.sql &&
             python run_migration.py migrations/007_user_notification.sql &&
             python run_migration.py migrations/008_user_settings.sql &&
             python run_migration.py migrations/009_household.sql &&
             python run_migration.py migrations/010_household_member.sql &&
             python run_migration.py migrations/011_active_household.sql &&
             python run_migration.py migrations/012_report_saved_view.sql &&
             python run_migration.py migrations/013_user_session.sql &&
             python run_migration.py migrations/014_retention_policy.sql &&
             python run_migration.py migrations/015_webhook_events.sql &&
             python run_migration.py migrations/016_digest_config.sql &&
             python run_migration.py migrations/017_webhook_event_lifecycle.sql &&
             python run_migration.py migrations/018_calendar_subscription_token.sql"
    restart: "no"

  expense-migrations:
    build:
      context: ./expense-microservice
      dockerfile: Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: expenses_db
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "python run_migration.py migrations/001_schema.sql &&
             python run_migration.py migrations/002_receipt_file_bytes.sql &&
             python run_migration.py migrations/003_idempotency.sql &&
             python run_migration.py migrations/004_plaid.sql &&
             python run_migration.py migrations/005_income_and_recurring.sql &&
             python run_migration.py migrations/006_tags.sql &&
             python run_migration.py migrations/007_exchange_rate.sql &&
             python run_migration.py migrations/008_teller.sql &&
             python run_migration.py migrations/009_household_scope.sql &&
             python run_migration.py migrations/010_expense_import.sql &&
             python run_migration.py migrations/011_savings_goals.sql &&
             python run_migration.py migrations/012_anomaly_feedback.sql &&
             python run_migration.py migrations/013_receipt_ocr.sql &&
             python run_migration.py migrations/014_plaid_provider.sql &&
             python run_migration.py migrations/015_apple_wallet.sql"
    restart: "no"

  budget-migrations:
    build:
      context: ./budget-microservice
      dockerfile: Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: budgets_db
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "python run_migration.py migrations/001_schema.sql &&
             python run_migration.py migrations/002_budget_alerts.sql &&
             python run_migration.py migrations/003_household_scope.sql"
    restart: "no"

  investment-migrations:
    build:
      context: ./investments-microservice
      dockerfile: Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: investments_db
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "python run_migration.py migrations/001_schema.sql && python run_migration.py migrations/003_recommendations_preferences.sql && python run_migration.py migrations/004_security_universe.sql && python run_migration.py migrations/005_sector_cache.sql && python run_migration.py migrations/006_etf_holdings.sql && python run_migration.py migrations/008_tax_lots.sql && python run_migration.py migrations/009_scenarios.sql && python run_migration.py migrations/010_fundamental_snapshot.sql && python run_migration.py migrations/011_sentiment_snapshot.sql"
    restart: "no"

  expense:
    build:
      context: ./expense-microservice
      dockerfile: Dockerfile
    environment:
      SECRET_KEY: ${SECRET_KEY:-dde1b0953d35f999ffdb4e55a066547b8ac69ec2415caa1835b865c1a07fa4a4}
      ALGORITHM: ${ALGORITHM:-HS256}
      JWT_ISSUER: ${JWT_ISSUER:-user-microservice}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-expense-tracker}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: expenses_db
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      RATE_LIMIT_EXPENSES_PER_MINUTE: ${RATE_LIMIT_EXPENSES_PER_MINUTE:-60}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      SECURITY_HEADERS_ENABLED: ${SECURITY_HEADERS_ENABLED:-true}
      HSTS_MAX_AGE_SECONDS: ${HSTS_MAX_AGE_SECONDS:-31536000}
      RECEIPT_STORAGE_BACKEND: ${RECEIPT_STORAGE_BACKEND:-local}
      RECEIPT_STORAGE_PATH: ${RECEIPT_STORAGE_PATH:-/data/receipts}
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID:-}
      PLAID_SECRET: ${PLAID_SECRET:-}
      PLAID_ENV: ${PLAID_ENV:-sandbox}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      TELLER_APP_ID: ${TELLER_APP_ID:-}
      TELLER_CERT_PATH: ${TELLER_CERT_PATH:-}
      TELLER_KEY_PATH: ${TELLER_KEY_PATH:-}
      TELLER_ENV: ${TELLER_ENV:-sandbox}
      USER_SERVICE_INTERNAL_URL: http://user:8000
      REDIS_URL: redis://redis:6379/0
    depends_on:
      expense-migrations:
        condition: service_completed_successfully
    volumes:
      - expense_receipts_data:/data/receipts
    ports:
      - "3001:3001"

  budget:
    build:
      context: ./budget-microservice
      dockerfile: Dockerfile
    environment:
      SECRET_KEY: ${SECRET_KEY:-dde1b0953d35f999ffdb4e55a066547b8ac69ec2415caa1835b865c1a07fa4a4}
      ALGORITHM: ${ALGORITHM:-HS256}
      JWT_ISSUER: ${JWT_ISSUER:-user-microservice}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-expense-tracker}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: budgets_db
      EXPENSE_DB_HOST: postgres
      EXPENSE_DB_PORT: 5432
      EXPENSE_DB_USER: ${POSTGRES_USER:-postgres}
      EXPENSE_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      EXPENSE_DB_NAME: expenses_db
      USER_SERVICE_INTERNAL_URL: http://user:8000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      SECURITY_HEADERS_ENABLED: ${SECURITY_HEADERS_ENABLED:-true}
      HSTS_MAX_AGE_SECONDS: ${HSTS_MAX_AGE_SECONDS:-31536000}
    depends_on:
      budget-migrations:
        condition: service_completed_successfully
    ports:
      - "3002:3002"

  investment:
    build:
      context: ./investments-microservice
      dockerfile: Dockerfile
    environment:
      SECRET_KEY: ${SECRET_KEY:-dde1b0953d35f999ffdb4e55a066547b8ac69ec2415caa1835b865c1a07fa4a4}
      ALGORITHM: ${ALGORITHM:-HS256}
      JWT_ISSUER: ${JWT_ISSUER:-user-microservice}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-expense-tracker}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: investments_db
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      SECURITY_HEADERS_ENABLED: ${SECURITY_HEADERS_ENABLED:-true}
      HSTS_MAX_AGE_SECONDS: ${HSTS_MAX_AGE_SECONDS:-31536000}
      # Market data (recommendations list + explain)
      MARKET_DATA_PROVIDER_ORDER: ${MARKET_DATA_PROVIDER_ORDER:-alpaca,finnhub,twelvedata,alphavantage}
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_API_SECRET: ${ALPACA_API_SECRET:-}
      ALPACA_DATA_BASE_URL: ${ALPACA_DATA_BASE_URL:-https://data.alpaca.markets}
      FREE_MARKET_API_KEY: ${FREE_MARKET_API_KEY:-}
      FREE_MARKET_BASE_URL: ${FREE_MARKET_BASE_URL:-https://finnhub.io/api/v1}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      FINNHUB_BASE_URL: ${FINNHUB_BASE_URL:-https://finnhub.io/api/v1}
      TWELVEDATA_API_KEY: ${TWELVEDATA_API_KEY:-}
      TWELVEDATA_BASE_URL: ${TWELVEDATA_BASE_URL:-https://api.twelvedata.com}
      ALPHAVANTAGE_API_KEY: ${ALPHAVANTAGE_API_KEY:-}
      ALPHAVANTAGE_BASE_URL: ${ALPHAVANTAGE_BASE_URL:-https://www.alphavantage.co}
      QUOTE_CACHE_MAX_AGE_SECONDS: ${QUOTE_CACHE_MAX_AGE_SECONDS:-60}
      MARKET_QUOTE_DEVIATION_PCT: ${MARKET_QUOTE_DEVIATION_PCT:-0.05}
      MARKET_PROVIDER_STATUS_CACHE_SECONDS: ${MARKET_PROVIDER_STATUS_CACHE_SECONDS:-60}
      # AI explainer (recommendation summary)
      AI_EXPLAINER_PROVIDER_ORDER: ${AI_EXPLAINER_PROVIDER_ORDER:-groq,brave,generic}
      AI_EXPLAINER_API_BASE: ${AI_EXPLAINER_API_BASE:-}
      AI_EXPLAINER_API_KEY: ${AI_EXPLAINER_API_KEY:-}
      AI_EXPLAINER_MODEL: ${AI_EXPLAINER_MODEL:-}
      AI_EXPLAINER_TIMEOUT_SECONDS: ${AI_EXPLAINER_TIMEOUT_SECONDS:-10}
      AI_EXPLAINER_MAX_NARRATIVE_CHARS: ${AI_EXPLAINER_MAX_NARRATIVE_CHARS:-500}
      GROQ_API_BASE: ${GROQ_API_BASE:-https://api.groq.com/openai/v1}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GROQ_TIMEOUT_SECONDS: ${GROQ_TIMEOUT_SECONDS:-6}
      GROQ_MAX_TOKENS: ${GROQ_MAX_TOKENS:-150}
      BRAVE_API_BASE: ${BRAVE_API_BASE:-https://api.search.brave.com/res/v1}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      BRAVE_MODEL: ${BRAVE_MODEL:-brave}
      BRAVE_TIMEOUT_SECONDS: ${BRAVE_TIMEOUT_SECONDS:-8}
      # News pipeline (recommendation details + /api/v1/news)
      NEWS_PROVIDER_ORDER: ${NEWS_PROVIDER_ORDER:-benzinga,finnhub,alphavantage}
      BENZINGA_API_KEY: ${BENZINGA_API_KEY:-}
      BENZINGA_BASE_URL: ${BENZINGA_BASE_URL:-https://api.benzinga.com}
      NEWS_TIMEOUT_SECONDS: ${NEWS_TIMEOUT_SECONDS:-8}
      NEWS_PAGE_SIZE: ${NEWS_PAGE_SIZE:-20}
    depends_on:
      investment-migrations:
        condition: service_completed_successfully
    ports:
      - "3003:3003"

  user:
    build:
      context: .
      dockerfile: user-microservice/Dockerfile
    environment:
      SECRET_KEY: ${SECRET_KEY:-dde1b0953d35f999ffdb4e55a066547b8ac69ec2415caa1835b865c1a07fa4a4}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      RESET_TOKEN_EXPIRE_HOURS: ${RESET_TOKEN_EXPIRE_HOURS:-1}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8000}
      EMAIL_MODE: ${EMAIL_MODE:-console}
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-false}
      RATE_LIMIT_LOGIN_PER_MINUTE: ${RATE_LIMIT_LOGIN_PER_MINUTE:-10}
      RATE_LIMIT_REGISTER_PER_MINUTE: ${RATE_LIMIT_REGISTER_PER_MINUTE:-5}
      RATE_LIMIT_API_PER_MINUTE: ${RATE_LIMIT_API_PER_MINUTE:-200}
      RATE_LIMIT_EXPENSIVE_PER_USER_PER_MINUTE: ${RATE_LIMIT_EXPENSIVE_PER_USER_PER_MINUTE:-60}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      SECURITY_HEADERS_ENABLED: ${SECURITY_HEADERS_ENABLED:-true}
      HSTS_MAX_AGE_SECONDS: ${HSTS_MAX_AGE_SECONDS:-31536000}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: users_db
      EXPENSE_SERVICE_URL: http://expense:3001
      BUDGET_SERVICE_URL: http://budget:3002
      INVESTMENT_SERVICE_URL: http://investment:3003
      EXPENSE_API_BASE_FRONTEND: ""
      BUDGET_API_BASE_FRONTEND: ""
      GATEWAY_PUBLIC_URL: ${GATEWAY_PUBLIC_URL:-http://localhost:8080}
      JWT_ISSUER: ${JWT_ISSUER:-user-microservice}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-expense-tracker}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-}
      APPLE_KEY_ID: ${APPLE_KEY_ID:-}
      APPLE_PRIVATE_KEY: ${APPLE_PRIVATE_KEY:-}
      APPLE_REDIRECT_URI: ${APPLE_REDIRECT_URI:-}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      EXPENSE_SERVICE_INTERNAL_URL: http://expense:3001
      BUDGET_SERVICE_INTERNAL_URL: http://budget:3002
      CALENDAR_TOKEN_BASE_URL: ${CALENDAR_TOKEN_BASE_URL:-http://localhost:8000}
    depends_on:
      user-migrations:
        condition: service_completed_successfully
      expense:
        condition: service_started
      budget:
        condition: service_started
      investment:
        condition: service_started
    ports:
      - "8000:8000"

  gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    environment:
      SECRET_KEY: ${SECRET_KEY:-dde1b0953d35f999ffdb4e55a066547b8ac69ec2415caa1835b865c1a07fa4a4}
      ALGORITHM: ${ALGORITHM:-HS256}
      JWT_ISSUER: ${JWT_ISSUER:-user-microservice}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-expense-tracker}
      REDIS_URL: redis://redis:6379/0
      USER_SERVICE_URL: http://user:8000
      EXPENSE_SERVICE_URL: http://expense:3001
      BUDGET_SERVICE_URL: http://budget:3002
      INVESTMENT_SERVICE_URL: http://investment:3003
      PROXY_TIMEOUT_SECONDS: 60
      GATEWAY_RATE_LIMIT_PER_USER: ${GATEWAY_RATE_LIMIT_PER_USER:-200}
      GATEWAY_RATE_LIMIT_PER_IP: ${GATEWAY_RATE_LIMIT_PER_IP:-300}
    depends_on:
      redis:
        condition: service_started
      user:
        condition: service_started
      expense:
        condition: service_started
      budget:
        condition: service_started
      investment:
        condition: service_started
    ports:
      - "8080:8080"

  expense-worker:
    build:
      context: ./expense-microservice
      dockerfile: Dockerfile
    environment:
      SECRET_KEY: ${SECRET_KEY:-dde1b0953d35f999ffdb4e55a066547b8ac69ec2415caa1835b865c1a07fa4a4}
      ALGORITHM: ${ALGORITHM:-HS256}
      JWT_ISSUER: ${JWT_ISSUER:-user-microservice}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-expense-tracker}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: expenses_db
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID:-}
      PLAID_SECRET: ${PLAID_SECRET:-}
      PLAID_ENV: ${PLAID_ENV:-sandbox}
      TELLER_APP_ID: ${TELLER_APP_ID:-}
      TELLER_CERT_PATH: ${TELLER_CERT_PATH:-}
      TELLER_KEY_PATH: ${TELLER_KEY_PATH:-}
      TELLER_ENV: ${TELLER_ENV:-sandbox}
      SCHEDULER_INTERVAL_SECONDS: ${EXPENSE_WORKER_INTERVAL_SECONDS:-3600}
      EXCHANGE_RATE_SOURCE: ${EXCHANGE_RATE_SOURCE:-ECB}
    depends_on:
      expense:
        condition: service_started
    command: python -m app.jobs.scheduler

  budget-worker:
    build:
      context: ./budget-microservice
      dockerfile: Dockerfile
    environment:
      SECRET_KEY: ${SECRET_KEY:-dde1b0953d35f999ffdb4e55a066547b8ac69ec2415caa1835b865c1a07fa4a4}
      ALGORITHM: ${ALGORITHM:-HS256}
      JWT_ISSUER: ${JWT_ISSUER:-user-microservice}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-expense-tracker}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: budgets_db
      EXPENSE_DB_HOST: postgres
      EXPENSE_DB_PORT: 5432
      EXPENSE_DB_USER: ${POSTGRES_USER:-postgres}
      EXPENSE_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      EXPENSE_DB_NAME: expenses_db
      USER_SERVICE_INTERNAL_URL: http://user:8000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      SCHEDULER_INTERVAL_SECONDS: ${BUDGET_WORKER_INTERVAL_SECONDS:-1800}
    depends_on:
      budget:
        condition: service_started
    command: python -m app.jobs.scheduler

  user-worker:
    build:
      context: .
      dockerfile: user-microservice/Dockerfile
    environment:
      SECRET_KEY: ${SECRET_KEY:-dde1b0953d35f999ffdb4e55a066547b8ac69ec2415caa1835b865c1a07fa4a4}
      ALGORITHM: ${ALGORITHM:-HS256}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: users_db
      EMAIL_MODE: ${EMAIL_MODE:-console}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      EXPENSE_SERVICE_INTERNAL_URL: http://expense:3001
      BUDGET_SERVICE_INTERNAL_URL: http://budget:3002
      SCHEDULER_INTERVAL_SECONDS: ${USER_WORKER_INTERVAL_SECONDS:-60}
      WEBHOOK_SECRETS_JSON: ${WEBHOOK_SECRETS_JSON:-{}}
    depends_on:
      user:
        condition: service_started
    command: python -m app.jobs.scheduler

volumes:
  postgres_data:
  expense_receipts_data:
