# Full login against your gateway (device must reach EXPO_PUBLIC_GATEWAY_URL from .env).
# Run:
#   cd mobile && E2E_EMAIL=you@example.com E2E_PASSWORD='secret' npm run e2e:maestro:login
#
# Uses Maestro -e flags; npm script passes them through.
appId: com.pocketii.app
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "e2e-auth-screen"
    timeout: 90000
- tapOn:
    id: "e2e-email"
- inputText: ${E2E_EMAIL}
- tapOn:
    id: "e2e-password"
- inputText: ${E2E_PASSWORD}
- tapOn:
    id: "e2e-login-submit"
- extendedWaitUntil:
    visible:
      id: "e2e-dashboard-hero"
    timeout: 120000
- assertVisible:
    id: "e2e-dashboard-hero"
