{% extends "layout.html" %}
{% block body_class %}goal-add-page{% endblock %}
{% block title %}Add Goal — Expense Tracker{% endblock %}
{% block back_link %}
<div class="container"><p class="page-back-wrap"><a href="/goals" class="page-back-link" aria-label="Back to goals">&#8592; Goals</a></p></div>
{% endblock %}
{% block content %}
<div class="container">

  <div class="page-header">
    <h1 class="page-title">New Savings Goal</h1>
  </div>

  <div class="card" style="max-width: 560px;">
    <form id="add-goal-form">

      <div class="form-group">
        <label for="name">Goal name</label>
        <input type="text" id="name" name="name" class="form-input" required maxlength="255" placeholder="e.g. Emergency fund">
      </div>

      <div class="form-group">
        <label for="target_amount">Target amount</label>
        <input type="number" id="target_amount" name="target_amount" class="form-input" step="0.01" min="0" required placeholder="0.00">
      </div>

      <div class="form-group">
        <label for="target_date">Target date (optional)</label>
        <input type="date" id="target_date" name="target_date" class="form-input">
      </div>

      <div class="form-group">
        <label for="start_amount">Starting amount (optional)</label>
        <input type="number" id="start_amount" name="start_amount" class="form-input" step="0.01" min="0" value="0" placeholder="0">
      </div>

      <div class="form-group">
        <label for="target_currency">Currency</label>
        <input type="text" id="target_currency" name="target_currency" class="form-input" maxlength="3" value="USD" placeholder="USD">
      </div>

      <div class="form-group">
        <label for="description">Description (optional)</label>
        <textarea id="description" name="description" class="form-input" rows="3" placeholder="What are you saving for?"></textarea>
      </div>

      <div id="add-goal-msg" class="message-error" style="display: none;"></div>

      <div style="display: flex; gap: 0.75rem; margin-top: 1rem; flex-wrap: wrap;">
        <button type="submit" class="btn btn-primary">Create goal</button>
        <a href="/goals" class="btn btn-ghost">Cancel</a>
      </div>

    </form>
  </div>

</div>
{% endblock %}
{% block scripts %}
<script nonce="{{ csp_nonce | default('') }}">
(function() {
    var form = document.getElementById('add-goal-form');
    var msg = document.getElementById('add-goal-msg');
    if (!form) return;
    var API = window.API_BASE || '';
    var headers = window.Auth && window.Auth.getAuthHeaders ? window.Auth.getAuthHeaders() : {};
    headers['Content-Type'] = 'application/json';
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        msg.style.display = 'none';
        var targetDate = document.getElementById('target_date').value || null;
        var body = {
            name: document.getElementById('name').value.trim(),
            target_amount: parseFloat(document.getElementById('target_amount').value, 10),
            target_currency: (document.getElementById('target_currency').value || 'USD').trim().toUpperCase().slice(0, 3),
            start_amount: parseFloat(document.getElementById('start_amount').value, 10) || 0,
            target_date: targetDate
        };
        fetch(API + '/api/v1/goals', {
            method: 'POST',
            headers: headers,
            body: JSON.stringify(body)
        }).then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
        .then(function(result) {
            if (result.ok) {
                window.location.href = '/goals/' + (result.data.goal_id || '');
            } else {
                msg.textContent = result.data.detail || 'Failed to create goal';
                msg.style.display = 'block';
            }
        }).catch(function() {
            msg.textContent = 'Request failed';
            msg.style.display = 'block';
        });
    });
})();
</script>
{% endblock %}
