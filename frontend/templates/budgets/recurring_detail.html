{% extends "layout.html" %}
{% block body_class %}recurring-budget-detail-page{% endblock %}
{% block title %}Recurring budget — pocketii{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto px-4 py-6 pb-24 md:pb-8" data-recurring-id="{{ recurring_budget_id }}">
    <a href="/budgets/recurring" class="text-sm text-[#135bec] font-semibold mb-4 inline-block">← Recurring budgets</a>
    <h1 class="text-2xl font-extrabold text-slate-900 dark:text-white mb-4">Recurring budget</h1>
    <div id="rb-detail" class="rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 p-5 space-y-2 text-sm"></div>
    <div class="mt-6 flex gap-2">
        <button type="button" id="rb-toggle-active" class="px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-600 text-sm font-semibold">Toggle active</button>
        <button type="button" id="rb-delete" class="px-4 py-2 rounded-lg border border-rose-200 text-rose-700 text-sm font-semibold">Delete</button>
    </div>
    <p id="rb-detail-msg" class="text-sm mt-3 text-slate-500"></p>
</div>
{% endblock %}
{% block scripts %}
<script nonce="{{ csp_nonce | default('') }}" src="/static/js/recurring_budget_detail.js"></script>
{% endblock %}
