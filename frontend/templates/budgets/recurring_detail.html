{% extends "layout.html" %}
{% block body_class %}recurring-budget-detail-page{% endblock %}
{% block title %}Recurring budget — pocketii{% endblock %}
{% block content %}
<div data-recurring-id="{{ recurring_budget_id }}">
    <div class="page-header">
        <div style="display:flex;align-items:center;gap:12px;">
            <a href="/budgets/recurring" class="btn btn-ghost btn-sm icon-btn-label" aria-label="Back">
                <span class="material-symbols-rounded">arrow_back</span>
            </a>
            <h1 class="page-title">Recurring budget</h1>
        </div>
    </div>

    <div class="card mb-16">
        <div id="rb-detail" class="muted" style="font-size:0.875rem;">Loading…</div>
    </div>

    <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button type="button" id="rb-toggle-active" class="btn btn-secondary icon-btn-label">
            <span class="material-symbols-rounded">toggle_on</span> Toggle active
        </button>
        <button type="button" id="rb-delete" class="btn btn-danger-ghost icon-btn-label">
            <span class="material-symbols-rounded">delete</span> Delete
        </button>
    </div>
    <p id="rb-detail-msg" class="form-hint" style="margin-top:8px;"></p>
</div>
{% endblock %}
{% block scripts %}
<script nonce="{{ csp_nonce | default('') }}" src="/static/js/recurring_budget_detail.js"></script>
{% endblock %}
