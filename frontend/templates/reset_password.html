{% extends "layout.html" %}
{% block body_class %}auth-page{% endblock %}
{% block title %}Reset password — Expense Tracker{% endblock %}
{% block content %}
<div class="container">
    <section class="card-section">
        <h3>Reset password</h3>
        <p class="lead">Enter your new password below.</p>
        <form id="reset-form" class="form-section" style="max-width: 400px; margin: 0 auto; text-align: left;">
            <input type="hidden" id="token" name="token" value="">
            <div class="form-group">
                <label for="new_password">New password</label>
                <input type="password" id="new_password" name="new_password" class="form-control" required minlength="8" placeholder="•••••••• (min 8 characters)">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" required minlength="8" placeholder="••••••••">
            </div>
            <div id="reset-message" class="message-error" style="display: none;"></div>
            <button type="submit" class="btn btn-primary">Reset password</button>
            <a href="/login" class="btn btn-secondary">Cancel</a>
        </form>
        <p style="margin-top: 1.5rem; font-size: 0.95rem;">
            <a href="/login" class="auth-link">Back to login</a>
        </p>
    </section>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/auth.js"></script>
<script>
(function() {
    var params = new URLSearchParams(window.location.search);
    var token = params.get('token') || '';
    document.getElementById('token').value = token;
    var form = document.getElementById('reset-form');
    var msg = document.getElementById('reset-message');
    var API = window.API_BASE || '';
    if (!token && form) {
        msg.textContent = 'Invalid or missing reset link. Request a new link from the forgot password page.';
        msg.classList.add('message-error');
        msg.style.display = 'block';
    }
    if (form) {
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            msg.style.display = 'none';
            var newPassword = document.getElementById('new_password').value;
            var confirmPassword = document.getElementById('confirm_password').value;
            if (newPassword !== confirmPassword) {
                msg.textContent = 'Passwords do not match.';
                msg.classList.add('message-error');
                msg.style.display = 'block';
                return;
            }
            if (newPassword.length < 8) {
                msg.textContent = 'Password must be at least 8 characters.';
                msg.classList.add('message-error');
                msg.style.display = 'block';
                return;
            }
            fetch(API + '/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token, new_password: newPassword })
            }).then(function(r) {
                return r.json().then(function(data) { return { ok: r.ok, data: data }; }).catch(function() { return { ok: r.ok, data: {} }; });
            }).then(function(result) {
                if (result.ok) {
                    msg.textContent = result.data.message || 'Password has been reset. You can log in now.';
                    msg.classList.remove('message-error');
                    msg.classList.add('message-success');
                    msg.style.display = 'block';
                    setTimeout(function() { window.location.href = '/login'; }, 2000);
                } else {
                    msg.textContent = (result.data.detail || 'Failed to reset password. The link may have expired.').toString();
                    msg.classList.add('message-error');
                    msg.style.display = 'block';
                }
            }).catch(function() {
                msg.textContent = 'Something went wrong. Try again later.';
                msg.classList.add('message-error');
                msg.style.display = 'block';
            });
        });
    }
})();
</script>
{% endblock %}
