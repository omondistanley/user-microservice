{% extends "layout.html" %}
{% block body_class %}expenses-page{% endblock %}
{% block title %}Expenses — pocketii{% endblock %}
{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">Expenses</h1>
        <p class="page-meta" id="expenses-balance"></p>
    </div>
    <a href="/expenses/add" class="btn btn-primary">+ Add Expense</a>
</div>

<div id="expenses-added-msg" class="auth-alert auth-alert--success" style="display:none;margin-bottom:16px;"></div>

<!-- Stats row -->
<div class="stat-row" id="expenses-stats-row" style="margin-bottom:24px;">
    <div class="stat-card">
        <div class="stat-label">Total Spent</div>
        <div class="stat-value" id="stat-total-spent">—</div>
        <div class="stat-change down" id="stat-total-change"></div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Daily Average</div>
        <div class="stat-value" id="stat-daily-avg">—</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Largest Expense</div>
        <div class="stat-value" id="stat-largest">—</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Transactions</div>
        <div class="stat-value" id="stat-tx-count">—</div>
    </div>
</div>

<!-- Filter bar -->
<div class="filter-bar" id="inline-filter-bar">
    <div class="filter-bar-inputs">
        <input type="date" id="filter-date-from" class="form-input filter-input" placeholder="From" title="From date">
        <input type="date" id="filter-date-to"   class="form-input filter-input" placeholder="To"   title="To date">
        <select id="filter-category" class="form-select filter-input">
            <option value="">All categories</option>
        </select>
        <input type="text" id="filter-tag" class="form-input filter-input" list="filter-tag-suggestions" placeholder="Search or tag…">
        <datalist id="filter-tag-suggestions"></datalist>
    </div>
    <div class="filter-bar-actions">
        <button type="button" id="filter-apply-btn" class="btn btn-primary btn-sm">Apply</button>
        <button type="button" id="filter-clear-btn" class="btn btn-ghost btn-sm">Clear</button>
    </div>
</div>

<div id="active-tag-chips"></div>

<!-- Results meta -->
<div class="results-meta" id="results-meta" style="display:none;">
    <span id="results-count"></span>
    <select id="filter-page-size" class="form-select" style="width:auto;">
        <option value="20" selected>20 / page</option>
        <option value="50">50 / page</option>
        <option value="100">100 / page</option>
    </select>
</div>

<!-- Expense list -->
<div id="expenses-list" class="expenses-list-wrap">
    <div class="page-skeleton">
        <div class="skel-row"></div><div class="skel-row"></div>
        <div class="skel-row"></div><div class="skel-row"></div>
        <div class="skel-row"></div>
    </div>
</div>

<!-- Pagination -->
<div id="expenses-pagination" class="pagination-bar" style="display:none;">
    <button type="button" id="pagination-prev" class="btn btn-ghost btn-sm">← Prev</button>
    <span id="pagination-info" class="pagination-info"></span>
    <button type="button" id="pagination-next" class="btn btn-ghost btn-sm">Next →</button>
</div>

<!-- Hidden summary elements used by layout.js panel -->
<div id="expenses-summary-wrap" style="display:none;">
    <div id="expenses-summary">
        <div id="summary-by-category"></div>
        <div id="summary-by-month" style="display:none;"></div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script nonce="{{ csp_nonce | default('') }}" src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<script nonce="{{ csp_nonce | default('') }}" src="/static/js/expenses.js"></script>
<script nonce="{{ csp_nonce | default('') }}" src="/static/js/budgets.js"></script>
<script nonce="{{ csp_nonce | default('') }}" src="/static/js/charts.js"></script>
<script nonce="{{ csp_nonce | default('') }}">
(function() {
    var listEl        = document.getElementById('expenses-list');
    var balanceEl     = document.getElementById('expenses-balance');
    var addedMsg      = document.getElementById('expenses-added-msg');
    var paginationEl  = document.getElementById('expenses-pagination');
    var paginationInfo = document.getElementById('pagination-info');
    var paginationPrev = document.getElementById('pagination-prev');
    var paginationNext = document.getElementById('pagination-next');
    var resultsMeta   = document.getElementById('results-meta');
    var resultsCount  = document.getElementById('results-count');
    var activeTagChips = document.getElementById('active-tag-chips');
    var summaryEl          = document.getElementById('expenses-summary');
    var summaryByCategory  = document.getElementById('summary-by-category');
    var summaryByMonth     = document.getElementById('summary-by-month');
    var statTotalSpent = document.getElementById('stat-total-spent');
    var statDailyAvg   = document.getElementById('stat-daily-avg');
    var statLargest    = document.getElementById('stat-largest');
    var statTxCount    = document.getElementById('stat-tx-count');

    var filterOpts   = { page: 1, page_size: 20 };
    var currentTotal = 0;
    var params       = new URLSearchParams(window.location.search);

    if (params.get('added') && addedMsg) {
        addedMsg.textContent = 'Expense saved.';
        addedMsg.style.display = 'block';
        window.history.replaceState({}, '', window.location.pathname);
    }

    function optsToQS(opts) {
        var p = [];
        if (opts.date_from)  p.push('date_from='  + encodeURIComponent(opts.date_from));
        if (opts.date_to)    p.push('date_to='    + encodeURIComponent(opts.date_to));
        if (opts.category)   p.push('category='   + encodeURIComponent(opts.category));
        if (opts.tag)        p.push('tag='        + encodeURIComponent(opts.tag));
        if (opts.min_amount != null && opts.min_amount !== '') p.push('min_amount=' + opts.min_amount);
        if (opts.max_amount != null && opts.max_amount !== '') p.push('max_amount=' + opts.max_amount);
        if (opts.page && opts.page > 1) p.push('page=' + opts.page);
        if (opts.page_size && opts.page_size !== 20) p.push('page_size=' + opts.page_size);
        return p.length ? p.join('&') : '';
    }

    function getFilterOpts() {
        return {
            date_from:  val('filter-date-from')  || undefined,
            date_to:    val('filter-date-to')    || undefined,
            category:   val('filter-category')   || undefined,
            tag:        (val('filter-tag') || '').trim() || undefined,
            page:       filterOpts.page,
            page_size:  parseInt(val('filter-page-size') || '20', 10)
        };
    }

    function val(id) { var el = document.getElementById(id); return el ? el.value : ''; }
    function fmt(v) { var n = parseFloat(v); return isNaN(n) ? '—' : '$' + n.toFixed(2); }

    function prefill() {
        set('filter-date-from', params.get('date_from'));
        set('filter-date-to',   params.get('date_to'));
        set('filter-tag',       params.get('tag'));
        var p = parseInt(params.get('page'), 10);
        if (!isNaN(p) && p >= 1) filterOpts.page = p;
        var ps = parseInt(params.get('page_size'), 10);
        if (!isNaN(ps) && ps >= 1) set('filter-page-size', String(ps));
    }

    function set(id, value) { var el = document.getElementById(id); if (el && value) el.value = value; }

    function updatePagination(total, page, pageSize) {
        currentTotal = total;
        if (resultsMeta) {
            if (total > 0) {
                resultsMeta.style.display = 'flex';
                if (resultsCount) resultsCount.textContent = total + ' expense' + (total !== 1 ? 's' : '');
            } else { resultsMeta.style.display = 'none'; }
        }
        if (!paginationEl) return;
        if (total <= pageSize) { paginationEl.style.display = 'none'; return; }
        var totalPages = Math.ceil(total / pageSize) || 1;
        paginationEl.style.display = 'flex';
        if (paginationInfo) paginationInfo.textContent = page + ' / ' + totalPages;
        if (paginationPrev) paginationPrev.disabled = page <= 1;
        if (paginationNext) paginationNext.disabled = page >= totalPages;
    }

    function updateTagChip() {
        if (!activeTagChips) return;
        var tag = (val('filter-tag') || '').trim();
        if (tag) {
            activeTagChips.innerHTML = '<span class="tag-badge">Tag: ' + tag +
                ' <button type="button" id="clear-tag-filter" style="background:none;border:none;cursor:pointer;color:inherit;margin-left:4px;font-size:0.85em;">✕</button></span>';
            var clearBtn = document.getElementById('clear-tag-filter');
            if (clearBtn) clearBtn.addEventListener('click', function() {
                set('filter-tag', ''); filterOpts.page = 1; renderList(); updateUrl();
            });
        } else { activeTagChips.innerHTML = ''; }
    }

    function loadStats() {
        if (!window.Expenses || !window.Expenses.getSummary) return;
        var opts = getFilterOpts();
        var now = new Date(), today = now.toISOString().slice(0,10);
        var firstDay = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0,10);
        var from = opts.date_from || firstDay, to = opts.date_to || today;
        window.Expenses.getSummary('category', from, to).then(function(res) {
            var items = (res && res.items) || [];
            var total = items.reduce(function(s, i) { return s + Number(i.total_amount||0); }, 0);
            var largest = items.reduce(function(m, i) { return Math.max(m, Number(i.total_amount||0)); }, 0);
            var days = Math.max(1, Math.round((new Date(to) - new Date(from)) / 86400000) + 1);
            if (statTotalSpent) statTotalSpent.textContent = fmt(total);
            if (statDailyAvg) statDailyAvg.textContent = fmt(total / days);
            if (statLargest) statLargest.textContent = fmt(largest);
        }).catch(function(){});
        // tx count from list query
        var api = window.EXPENSE_API_BASE || '';
        var headers = window.Auth && window.Auth.getAuthHeaders ? window.Auth.getAuthHeaders() : {};
        var q = '?page=1&page_size=1' + (from ? '&date_from=' + from : '') + (to ? '&date_to=' + to : '');
        var fn = window.Auth && window.Auth.requestWithRefresh
            ? function() { return window.Auth.requestWithRefresh(api + '/api/v1/expenses' + q, { headers: headers }); }
            : function() { return fetch(api + '/api/v1/expenses' + q, { headers: headers }); };
        fn().then(function(r) { return r.ok ? r.json() : Promise.reject(); })
            .then(function(d) { if (statTxCount && d && d.total != null) statTxCount.textContent = d.total; })
            .catch(function(){});
    }

    function renderCategorySummary(items, withBudget) {
        if (!summaryByCategory) return;
        var html;
        if (!withBudget) {
            html = '<ul class="summary-list">' + items.map(function(i) {
                var amt = Number(i.total_amount || 0).toFixed(2);
                return '<li><span class="summary-label">' + (i.label || i.group_key) + '</span><strong>' + amt + '</strong></li>';
            }).join('') + '</ul>';
        } else {
            html = '<ul class="summary-list">' + withBudget.map(function(r) {
                var i = r.item, amt = Number(i.total_amount || 0), limit = r.budget && r.budget.amount != null ? Number(r.budget.amount) : null;
                var part = '<strong>' + amt.toFixed(2) + '</strong>';
                if (limit != null) {
                    part += ' / ' + limit.toFixed(2);
                    if (amt > limit) part += ' <span class="summary-over-budget">+' + (amt-limit).toFixed(2) + '</span>';
                }
                return '<li><span class="summary-label">' + (i.label || i.group_key) + '</span>' + part + '</li>';
            }).join('') + '</ul>';
        }
        summaryByCategory.innerHTML = html;
        if (summaryEl) summaryEl.style.display = 'block';
    }

    function loadSummary() {
        if (!window.Expenses || !window.Expenses.getSummary) return;
        var opts = getFilterOpts();
        var now = new Date(), today = now.toISOString().slice(0,10);
        var sixAgo = new Date(now.getFullYear(), now.getMonth()-6, 1).toISOString().slice(0,10);
        var from = opts.date_from || sixAgo, to = opts.date_to || today;
        Promise.all([
            window.Expenses.getSummary('category', from, to),
            window.Expenses.getSummary('month', from, to)
        ]).then(function(res) {
            var cats   = (res[0] && res[0].items) || [];
            var months = (res[1] && res[1].items) || [];
            if (summaryByMonth) {
                summaryByMonth.innerHTML = months.length ? '<ul class="summary-list">' + months.map(function(i) {
                    return '<li><span class="summary-label">' + (i.label || i.group_key) + '</span><strong>' + Number(i.total_amount||0).toFixed(2) + '</strong></li>';
                }).join('') + '</ul>' : '<p>No data.</p>';
            }
            if (!cats.length) {
                if (summaryByCategory) summaryByCategory.innerHTML = '<p>No data.</p>';
                if (summaryEl) summaryEl.style.display = 'block';
                return;
            }
            var effectiveDate = to || today;
            if (!window.Budgets || !window.Budgets.getEffective) {
                renderCategorySummary(cats, null);
            } else {
                Promise.all(cats.map(function(i) {
                    var code = parseInt(i.group_key, 10);
                    if (isNaN(code)) return Promise.resolve({ item: i, budget: null });
                    return window.Budgets.getEffective(code, effectiveDate)
                        .then(function(b) { return { item: i, budget: b }; })
                        .catch(function() { return { item: i, budget: null }; });
                })).then(function(r) { renderCategorySummary(cats, r); });
            }
        }).catch(function() {
            if (summaryByCategory) summaryByCategory.innerHTML = '<p>Summary unavailable.</p>';
        });
    }

    function renderList() {
        filterOpts = getFilterOpts();
        updateTagChip();
        if (window.Expenses && typeof window.Expenses.loadList === 'function') {
            window.Expenses.loadList(listEl, balanceEl, filterOpts, updatePagination);
        }
        loadSummary();
        loadStats();
    }

    function updateUrl() {
        var qs = optsToQS(getFilterOpts());
        window.history.replaceState({}, '', '/expenses' + (qs ? '?' + qs : ''));
    }

    if (window.Expenses) {
        if (typeof window.Expenses.loadBalance === 'function') window.Expenses.loadBalance(balanceEl);
        prefill();
        if (window.Expenses.getCategories) {
            window.Expenses.getCategories().then(function(cats) {
                var sel = document.getElementById('filter-category');
                if (sel && Array.isArray(cats)) {
                    sel.innerHTML = '<option value="">All categories</option>' + cats.map(function(c) {
                        return '<option value="' + c.name + '">' + c.name + '</option>';
                    }).join('');
                    var cv = params.get('category');
                    if (cv && sel) sel.value = cv;
                }
                renderList();
            }).catch(renderList);
            if (window.Expenses.fillTagSuggestions) {
                window.Expenses.fillTagSuggestions(
                    document.getElementById('filter-tag'),
                    document.getElementById('filter-tag-suggestions')
                ).catch(function(){});
            }
        } else { renderList(); }
    }

    var applyBtn = document.getElementById('filter-apply-btn');
    if (applyBtn) applyBtn.addEventListener('click', function() { filterOpts.page = 1; renderList(); updateUrl(); });
    var clearBtn = document.getElementById('filter-clear-btn');
    if (clearBtn) clearBtn.addEventListener('click', function() {
        ['filter-date-from','filter-date-to','filter-category','filter-tag'].forEach(function(id) {
            var el = document.getElementById(id); if (el) el.value = '';
        });
        filterOpts.page = 1; renderList(); updateUrl();
    });
    var pageSizeSel = document.getElementById('filter-page-size');
    if (pageSizeSel) pageSizeSel.addEventListener('change', function() { filterOpts.page = 1; renderList(); });
    if (paginationPrev) paginationPrev.addEventListener('click', function() {
        if (filterOpts.page > 1) { filterOpts.page--; renderList(); updateUrl(); }
    });
    if (paginationNext) paginationNext.addEventListener('click', function() {
        var ps = filterOpts.page_size || 20;
        if (filterOpts.page < Math.ceil(currentTotal / ps)) { filterOpts.page++; renderList(); updateUrl(); }
    });
    document.querySelectorAll('.summary-tab').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.summary-tab').forEach(function(b) { b.classList.remove('active'); });
            this.classList.add('active');
            var g = this.getAttribute('data-group');
            if (summaryByCategory) summaryByCategory.style.display = g === 'category' ? 'block' : 'none';
            if (summaryByMonth)    summaryByMonth.style.display    = g === 'month'    ? 'block' : 'none';
        });
    });
})();
</script>
{% endblock %}
