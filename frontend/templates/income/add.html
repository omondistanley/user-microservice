{% extends "layout.html" %}
{% block title %}Add Income — Expense Tracker{% endblock %}
{% block back_link %}
<div class="container"><p class="page-back-wrap"><a href="/income" class="page-back-link" aria-label="Back to income">← Income</a></p></div>
{% endblock %}
{% block content %}
<div class="container">
    <section class="card-section">
        <h2>Add income</h2>
        <form id="income-add-form">
            <div class="form-group">
                <label for="income-amount">Amount</label>
                <input id="income-amount" class="form-control" type="number" min="0" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="income-date">Date</label>
                <input id="income-date" class="form-control" type="date" required>
            </div>
            <div class="form-group">
                <label for="income-currency">Currency</label>
                <input id="income-currency" class="form-control" type="text" maxlength="3" value="USD" required>
            </div>
            <div class="form-group">
                <label for="income-type">Type</label>
                <select id="income-type" class="form-control" required>
                    <option value="salary">Salary</option>
                    <option value="freelance">Freelance</option>
                    <option value="dividend">Dividend</option>
                    <option value="interest">Interest</option>
                    <option value="other" selected>Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="income-source">Source (optional)</label>
                <input id="income-source" class="form-control" type="text" maxlength="255">
            </div>
            <div class="form-group">
                <label for="income-description">Description (optional)</label>
                <textarea id="income-description" class="form-control" maxlength="2000"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Save income</button>
            <a href="/income" class="btn btn-secondary">Back to income</a>
        </form>
        <p id="income-form-message" class="note" style="display:none;margin-top:1rem;"></p>
    </section>
</div>
{% endblock %}
{% block scripts %}
<script nonce="{{ csp_nonce | default('') }}" src="/static/js/income.js"></script>
<script nonce="{{ csp_nonce | default('') }}">
(function() {
    var form = document.getElementById('income-add-form');
    var msg = document.getElementById('income-form-message');
    var dateEl = document.getElementById('income-date');
    if (dateEl && !dateEl.value) dateEl.value = new Date().toISOString().slice(0, 10);

    function show(text, ok) {
        if (!msg) return;
        msg.style.display = 'block';
        msg.textContent = text;
        msg.style.borderColor = ok ? '#28a745' : '#dc3545';
    }

    if (!form || !window.Income) return;
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        var payload = {
            amount: document.getElementById('income-amount').value,
            date: document.getElementById('income-date').value,
            currency: (document.getElementById('income-currency').value || 'USD').toUpperCase(),
            income_type: document.getElementById('income-type').value,
            source_label: document.getElementById('income-source').value || null,
            description: document.getElementById('income-description').value || null
        };
        window.Income.create(payload).then(function() {
            show('Income saved.', true);
            setTimeout(function() { window.location.href = '/income'; }, 500);
        }).catch(function(err) {
            show('Could not save income: ' + (err.message || 'error'), false);
        });
    });
})();
</script>
{% endblock %}
