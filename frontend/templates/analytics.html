{% extends "layout.html" %}
{% block body_class %}analytics-page{% endblock %}
{% block title %}Analytics — pocketii{% endblock %}
{% block content %}
<div class="page-header">
    <h1 class="page-title">Analytics</h1>
</div>
<div id="analytics-status" style="font-size:13px;color:var(--s500);margin-bottom:8px;" role="status"></div>
<div class="grid-3 mb-24">
    <div class="stat-card">
        <div class="stat-label">Income</div>
        <div class="stat-value" id="an-income">—</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Expenses</div>
        <div class="stat-value" id="an-expense">—</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Net</div>
        <div class="stat-value" id="an-net">—</div>
    </div>
</div>
<div class="card">
    <div class="card-header"><span class="card-title">Spend by category</span></div>
    <ul id="an-cats" style="list-style:none;display:flex;flex-direction:column;gap:10px;margin-top:8px;"></ul>
</div>
{% endblock %}
{% block scripts %}
<script nonce="{{ csp_nonce | default('') }}" src="/static/js/analytics.js"></script>
{% endblock %}
