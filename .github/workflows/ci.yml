name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend CSS (Tailwind) ─────────────────────────────────────────────────
  frontend-css:
    name: Build frontend CSS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install and build
        run: |
          cd frontend
          npm ci
          npm run build:css
      - name: Verify compiled file exists
        run: test -s frontend/static/css/app.tw.css

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          [
            expense-microservice,
            investments-microservice,
            user-microservice,
            budget-microservice,
            api-gateway,
          ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ${{ matrix.service }}/requirements.txt

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check ${{ matrix.service }}/app/ --output-format=github

  # ── Tests ───────────────────────────────────────────────────────────────────
  test-expense:
    name: Test expense-microservice
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: expenses_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: expenses_db
      SECRET_KEY: ci-test-secret-key-32-bytes-long!
      ENCRYPTION_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: expense-microservice/requirements.txt

      - name: Install dependencies
        run: |
          cd expense-microservice
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Apply migrations
        run: |
          cd expense-microservice
          for f in migrations/*.sql; do
            echo "Applying $f"
            psql "postgresql://postgres:postgres@localhost:5432/expenses_db" -f "$f" --on-error-stop
          done

      - name: Run tests
        run: |
          cd expense-microservice
          python -m pytest tests/ -v --tb=short

  test-investments:
    name: Test investments-microservice
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: investments_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_HOST: localhost
      DB_PORT: "5433"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: investments_db
      SECRET_KEY: ci-test-secret-key-32-bytes-long!

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: investments-microservice/requirements.txt

      - name: Install dependencies
        run: |
          cd investments-microservice
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Apply migrations
        run: |
          cd investments-microservice
          for f in migrations/*.sql; do
            echo "Applying $f"
            psql "postgresql://postgres:postgres@localhost:5433/investments_db" -f "$f" --on-error-stop
          done

      - name: Run tests
        run: |
          cd investments-microservice
          python -m pytest tests/ -v --tb=short

  test-user:
    name: Test user-microservice
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: users_db
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_HOST: localhost
      DB_PORT: "5434"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: users_db
      SECRET_KEY: ci-test-secret-key-32-bytes-long!

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: user-microservice/requirements.txt

      - name: Install dependencies
        run: |
          cd user-microservice
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Apply migrations
        run: |
          cd user-microservice
          for f in migrations/create_user_table.sql migrations/0*.sql; do
            [ -f "$f" ] || continue
            echo "Applying $f"
            psql "postgresql://postgres:postgres@localhost:5434/users_db" -f "$f" --on-error-stop
          done

      - name: Run tests
        run: |
          cd user-microservice
          python -m pytest tests/ -v --tb=short

  test-budget:
    name: Test budget-microservice
    runs-on: ubuntu-latest
    needs: lint

    env:
      SECRET_KEY: ci-test-secret-key-32-bytes-long!

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: budget-microservice/requirements.txt

      - name: Install dependencies
        run: |
          cd budget-microservice
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: |
          cd budget-microservice
          python -m pytest tests/ -v --tb=short

  test-gateway:
    name: Test api-gateway
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: api-gateway/requirements.txt

      - name: Install dependencies
        run: |
          cd api-gateway
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          cd api-gateway
          python -m pytest tests/ -v --tb=short

  # ── Migration safety check ──────────────────────────────────────────────────
  migration-check:
    name: Migration safety check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Check migration file ordering
        run: |
          echo "Checking expense migrations are sequentially numbered..."
          last=0
          for f in expense-microservice/migrations/*.sql; do
            num=$(basename "$f" | grep -oE '^[0-9]+')
            if [ -n "$num" ]; then
              if [ "$num" -le "$last" ]; then
                echo "ERROR: out-of-order or duplicate migration: $f (previous=$last)"
                exit 1
              fi
              last=$num
            fi
          done
          echo "✔ Expense migrations OK (last=$last)"
          last=0
          for f in investments-microservice/migrations/*.sql; do
            num=$(basename "$f" | grep -oE '^[0-9]+')
            if [ -n "$num" ]; then
              if [ "$num" -le "$last" ]; then
                echo "ERROR: out-of-order or duplicate migration: $f (previous=$last)"
                exit 1
              fi
              last=$num
            fi
          done
          echo "✔ Investments migrations OK (last=$last)"

      - name: Verify deploy/release.sh lists every migration file
        run: bash scripts/check_migrations_in_release.sh
